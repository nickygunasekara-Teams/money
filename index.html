<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Israel - Secure Authentication Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1920') no-repeat center center fixed; background-size: cover; }
        .glass-panel { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; padding: 10px; border-radius: 8px; color: white; transition: all 0.2s; }
        .glass-input:focus { background: rgba(255, 255, 255, 0.1); border-color: #f59e0b; outline: none; }
        #loading-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; justify-content: center; align-items: center; color: #f59e0b; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between p-4 md:p-8">

    <div id="loading-overlay">Verifying Secure Session...</div>

    <header class="w-full max-w-7xl mx-auto flex justify-between items-center bg-white/5 backdrop-blur-md p-4 rounded-xl border border-white/10">
        <div class="flex items-center gap-3">
            <img src="logo.png" onerror="this.style.display='none';" class="h-8 max-w-[120px] object-contain">
            <div>
                <h1 class="text-2xl font-black tracking-wider text-yellow-500">MONEY</h1>
                <span class="text-[9px] bg-amber-500 text-white px-2.5 py-0.5 rounded-full uppercase font-bold tracking-wide">Gateway • Israel</span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-md mx-auto flex-grow flex items-center justify-center my-6">
        <div class="glass-panel rounded-2xl p-6 sm:p-8 space-y-6 shadow-2xl w-full">
            <div class="text-center space-y-2">
                <img src="logo.png" onerror="this.style.display='none';" class="h-10 mx-auto object-contain mb-2">
                <h2 class="text-2xl font-bold text-yellow-500">System Login</h2>
                <p class="text-xs text-gray-400 uppercase tracking-widest">Authorized Executive Access Only</p>
            </div>
            
            <form id="login-form" class="space-y-4 text-sm">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Email Address / Username</label>
                    <input type="email" id="login-email" class="glass-input" placeholder="manager@money.com" required>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs text-gray-400">Security Password</label>
                        <button type="button" id="btn-forgot-password" class="text-xs text-yellow-500 hover:underline">Forgot Password?</button>
                    </div>
                    <input type="password" id="login-password" class="glass-input" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btn-login" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 text-black font-black py-3 px-4 rounded-xl text-xs uppercase tracking-wider shadow-lg transition">
                    Verify & Authenticate Node
                </button>
            </form>
        </div>
    </main>

    <footer class="w-full max-w-7xl mx-auto text-center text-[10px] text-gray-500">
        &copy; 2026 Money Israel Ecosystem. Protected by Cloud Identity Security Infrastructure protocols.
    </footer>

    <script type="module">
        import MONEY_CONFIG from './js/config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(MONEY_CONFIG.firebase);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const staffDoc = await getDoc(doc(db, "staff", user.email));
                if (staffDoc.exists()) {
                    window.location.href = staffDoc.data().role === "admin" ? "admin.html" : "balancer.html";
                } else { document.getElementById('loading-overlay').style.display = 'none'; }
            } else { document.getElementById('loading-overlay').style.display = 'none'; }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const password = document.getElementById('login-password').value;
            try {
                await setPersistence(auth, browserSessionPersistence);
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) { alert("Invalid Credentials."); }
        });

        document.getElementById('btn-forgot-password').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            if(!email) return alert("Enter email first.");
            await sendPasswordResetEmail(auth, email);
            alert("Reset link sent!");
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Israel - Advanced KYC Onboarding Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1920') no-repeat center center fixed; background-size: cover; }
        .glass-panel { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s ease-in-out; }
        .glass-input:focus { background: rgba(255, 255, 255, 0.1); border-color: #f59e0b; outline: none; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between p-3 md:p-6">

    <header class="w-full max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center bg-white/5 backdrop-blur-md p-4 rounded-xl border border-white/10 gap-3 mb-6">
        <div class="flex items-center gap-3">
            <img src="logo.png" onerror="this.style.display='none';" class="h-8 max-w-[120px] object-contain">
            <div>
                <h1 class="text-2xl font-bold tracking-wider text-yellow-500">MONEY REGISTRY</h1>
                <p class="text-[9px] text-gray-400 font-mono uppercase tracking-widest">Anti-Money Laundering (AML) Compliance Onboarding</p>
            </div>
        </div>
        <div class="flex gap-2">
            <a href="admin.html" id="link-admin-back" class="bg-blue-500/10 text-blue-400 text-xs px-3 py-2 rounded-lg border border-blue-500/20 hidden hover:bg-blue-500 hover:text-white transition">Admin Dashboard</a>
            <a href="balancer.html" class="bg-yellow-500/10 text-yellow-500 text-xs px-3 py-2 rounded-lg border border-yellow-200/20 hover:bg-yellow-500 hover:text-black transition">Return Cash Balancer</a>
        </div>
    </header>

    <main class="w-full max-w-7xl mx-auto flex-grow space-y-6">
        <form id="onboarding-form" class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
            <div class="glass-panel rounded-2xl p-5 space-y-4 shadow-2xl">
                <h2 class="text-base font-bold text-yellow-500 border-b border-white/10 pb-2 uppercase tracking-wider">1. Demographics & Contact</h2>
                <div class="space-y-3 text-xs sm:text-sm">
                    <div><label class="block text-gray-400 mb-1">Full Name *</label><input type="text" id="remitter-name" class="glass-input w-full p-2.5 rounded-lg text-white text-left" required></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-gray-400 mb-1">Date of Birth *</label><input type="date" id="remitter-dob" class="glass-input w-full p-2.5 rounded-lg text-white text-left" required></div>
                        <div><label class="block text-gray-400 mb-1">Nationality *</label><input type="text" id="remitter-nationality" class="glass-input w-full p-2.5 rounded-lg text-white text-left" placeholder="e.g. Sri Lankan" required></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-gray-400 mb-1">Email Address *</label><input type="email" id="remitter-email" class="glass-input w-full p-2.5 rounded-lg text-white text-left" required></div>
                        <div><label class="block text-gray-400 mb-1">Mobile Number *</label><input type="tel" id="remitter-phone" class="glass-input w-full p-2.5 rounded-lg text-white text-left" placeholder="+972XXXXXXXXX" required></div>
                    </div>
                    <div><label class="block text-gray-400 mb-1">Permanent Residential Address *</label><input type="text" id="remitter-address" class="glass-input w-full p-2.5 rounded-lg text-white text-left" placeholder="Street, City, District" required></div>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-5 space-y-4 shadow-2xl">
                <h2 class="text-base font-bold text-yellow-500 border-b border-white/10 pb-2 uppercase tracking-wider">2. Identity Validation (KYC)</h2>
                <div class="space-y-3 text-xs sm:text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-gray-400 mb-1">Passport Number *</label><input type="text" id="remitter-passport-no" class="glass-input w-full p-2.5 rounded-lg text-white text-left uppercase font-mono" required></div>
                        <div><label class="block text-gray-400 mb-1">Passport Expiry *</label><input type="date" id="remitter-passport-exp" class="glass-input w-full p-2.5 rounded-lg text-white text-left" required></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="block text-gray-400 mb-1">Work Permit No.</label><input type="text" id="remitter-wp-no" class="glass-input w-full p-2.5 rounded-lg text-white text-left uppercase font-mono"></div>
                        <div><label class="block text-gray-400 mb-1">Work Permit Expiry</label><input type="date" id="remitter-wp-exp" class="glass-input w-full p-2.5 rounded-lg text-white text-left"></div>
                    </div>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-5 space-y-4 shadow-2xl">
                <h2 class="text-base font-bold text-yellow-500 border-b border-white/10 pb-2 uppercase tracking-wider">3. Employment & Income (AML/CFT)</h2>
                <div class="space-y-3 text-xs sm:text-sm">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-400 mb-1">Income Source *</label>
                            <select id="income-source-type" class="glass-input w-full p-2.5 rounded-lg text-white bg-slate-900 text-left font-medium">
                                <option value="Salary_Worker">Salaried Employment</option>
                                <option value="Business_Owner">Business Operator</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">Occupation *</label>
                            <input type="text" id="income-source-detail" class="glass-input w-full p-2.5 rounded-lg text-white text-left" required>
                        </div>
                    </div>
                    <div><label class="block text-gray-400 mb-1">Employer Name *</label><input type="text" id="employer-name" class="glass-input w-full p-2.5 rounded-lg text-white text-left" required></div>
                </div>
            </div>

            <div class="glass-panel rounded-2xl p-5 space-y-4 shadow-2xl">
                <h2 class="text-base font-bold text-yellow-500 border-b border-white/10 pb-2 uppercase tracking-wider">4. Document Vault</h2>
                <div class="space-y-3 text-xs sm:text-sm">
                    <div><label class="block text-amber-500 font-bold mb-1">Passport Copy *</label><input type="file" id="doc-passport" class="w-full text-xs bg-white/5 p-2 rounded-lg border border-white/10 cursor-pointer" required></div>
                    <div><label class="block text-gray-400 mb-1">Digital Autograph Verification *</label>
                        <div class="relative bg-black/40 rounded-lg border border-white/20"><canvas id="signature-pad" width="350" height="100" class="w-full touch-none"></canvas></div>
                    </div>
                    <button type="submit" id="btn-submit-main" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 text-black font-black py-3 rounded-xl uppercase tracking-wider text-xs shadow-lg transition">Commit & Register Profile</button>
                </div>
            </div>
        </form>
    </main>

    <script type="module">
        import MONEY_CONFIG from './js/config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const app = initializeApp(MONEY_CONFIG.firebase);
        const auth = getAuth(app);
        const registerCustomer = httpsCallable(getFunctions(app), 'registerCustomer');

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

        document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('btn-submit-main');
            submitBtn.disabled = true; submitBtn.textContent = "Executing Integrity Audits...";

            try {
                // [Insert logic to process files and then call registerCustomer function]
                const result = await registerCustomer({
                    fullName: document.getElementById('remitter-name').value,
                    email: document.getElementById('remitter-email').value,
                    // ... [Other fields]
                });
                alert("KYC Registry Node Cleared! CIF ID: " + result.data.cifNumber);
                document.getElementById('onboarding-form').reset();
            } catch (err) { alert("Registration failed: " + err.message); }
            finally { submitBtn.disabled = false; submitBtn.textContent = "Commit & Register Profile"; }
        });
        
        // Signature Logic (Remains unchanged)
        const canvas = document.getElementById('signature-pad'); const ctx = canvas.getContext('2d');
        let isDrawing = false; ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2;
        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mousemove', (e) => { if(isDrawing) { /* draw logic */ } });
        canvas.addEventListener('mouseup', () => isDrawing = false);
    </script>
</body>
</html>

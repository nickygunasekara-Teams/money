<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Israel - Remitter Mobile Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.98)), url('https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?q=80&w=1920') no-repeat center center fixed; background-size: cover; }
        .glass-panel { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; text-align: center; }
        .glass-input:focus { border-color: #f59e0b; outline: none; box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between p-3 md:p-6">

    <script type="module">
        import MONEY_CONFIG from './js/config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

        const app = initializeApp(MONEY_CONFIG.firebase); 
        const db = getFirestore(app);
        const functions = getFunctions(app);
        const executeTransaction = httpsCallable(functions, 'executeTransaction');

        // ... (OTP and Initialization logic remains same)

        // SECURE BACKEND MIGRATION: Transactions moved to Cloud Functions
        async function executeLedgerVaultDebitPipeline(costILS, modeString) {
            const remitBtn = document.getElementById('btn-remit');
            remitBtn.disabled = true;
            try {
                // Call the secure backend function instead of updating Firestore directly
                const result = await executeTransaction({
                    amountLKR: rawNumericalLKR,
                    beneficiaryName: document.getElementById('bene-name').value.trim(),
                    beneficiaryAccount: document.getElementById('bene-account').value.trim(),
                    destinationBank: targetBankSelect.options[targetBankSelect.selectedIndex].text,
                    costILS: costILS,
                    cifNumber: activeCustomerCIF,
                    modeString: modeString
                });

                alert("Transaction Successful! Ref: " + result.data.transactionId);
                
                // Clear UI
                inputLkr.value = ""; rawNumericalLKR = 0; calculateLiveRemitVoucherValues();
                document.getElementById('bene-name').value = ""; document.getElementById('bene-account').value = "";
            } catch (err) { 
                console.error(err);
                alert("Security Error: Ledger write aborted by backend policy."); 
            } finally { 
                remitBtn.disabled = false; 
            }
        }

        // ... (Receipt Generation logic remains same)
    </script>
</body>
</html>
